services:
  app:
    build: .
    container_name: mm-wall-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "8000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: mm-wall-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
